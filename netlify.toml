[build]
  base = "frontend"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Forcamos a integracao oficial do Next.js na Netlify para evitar deploy verde
# com preview a devolver 404 em projetos com App Router.
